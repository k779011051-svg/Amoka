# ============================================================
# FSD50K multi-label evaluation configuration
# ============================================================

# Inference result generated by infer_fsd50k.py
result_path: outputs/fsd50k_amoka_cot_results.jsonl

# Official FSD50K vocabulary
vocabulary_path: /path/to/FSD50K/FSD50K.metadata/vocabulary.csv
vocab_label_column: 1

# JSONL field names
target_field: ground_truth_strict
strict_prediction_field: prediction_strict
semantic_prediction_field: prediction_raw

# Semantic evaluation
semantic_threshold: 0.5
sbert_model: all-MiniLM-L6-v2

# Evaluation summary
save_summary: outputs/fsd50k_amoka_cot_evaluation.json